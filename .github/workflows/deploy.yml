name: Build and Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Astro site
        run: npm run build

      - name: Deploy to Vercel
        run: npx vercel deploy --prod --token "${{ secrets.VERCEL_TOKEN }}" --scope "team_WJNyygztPcpqGdESwVBy6fyZ"